services:
  mysql:
    image: mysql:8.4
    container_name: vscanmail-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vscanmail
      MYSQL_USER: vscanmail
      MYSQL_PASSWORD: vscanmail
    volumes:
      - vscanmail_mysql_data:/var/lib/mysql

volumes:
  vscanmail_mysql_data:

